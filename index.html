<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MinionSpeak</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #15202B;
      --card-bg: #192734;
      --border: #38444D;
      --text: #FFFFFF;
      --text-secondary: #8899A6;
      --accent: #1DA1F2;
      --accent-hover: #1a91da;
      --danger: #E0245E;
      --success: #17BF63;
      --font-title: 'Luckiest Guy', cursive;
      --font-body: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #app {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 850px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .app-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-title);
      font-size: 22px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo span {
      background: var(--accent);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
    }
    .header-actions { display: flex; gap: 12px; }
    .icon-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(29,161,242,0.1); }
    .main-content { flex: 1; overflow-y: auto; background: var(--bg); }
    .section { display: none; }
    .section.active { display: block; height: 100%; }
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 8px 0;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      color: var(--text-secondary);
      font-size: 22px;
      cursor: pointer;
      padding: 6px 0;
      transition: color 0.2s;
      position: relative;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item span { display: block; font-size: 10px; font-weight: 600; margin-top: 2px; }
    .badge {
      position: absolute;
      top: 2px;
      right: calc(50% - 24px);
      background: var(--danger);
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .auth-container {
      padding: 32px 20px;
      background: var(--card-bg);
      border-radius: 16px;
      margin: 24px 16px;
      border: 1px solid var(--border);
    }
    .form-group { margin-bottom: 16px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      transition: 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 24px;
      font-family: var(--font-title);
      font-size: 18px;
      color: white;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: 0.2s;
      font-weight: 600;
    }
    .btn:hover { background: var(--accent-hover); }
    .link { text-align: center; margin-top: 16px; color: var(--accent); cursor: pointer; font-weight: 600; }
    .link:hover { text-decoration: underline; }
    .post {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      transition: background 0.2s;
    }
    .post:hover { background: rgba(29,161,242,0.03); }
    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 18px;
      cursor: pointer;
      background-size: cover;
      background-position: center;
    }
    .post-user-info { flex: 1; cursor: pointer; }
    .post-username { font-weight: 700; color: var(--text); font-size: 15px; }
    .post-handle { color: var(--text-secondary); font-size: 13px; }
    .post-caption { font-size: 15px; line-height: 1.4; margin-bottom: 8px; }
    .post-image { width: 100%; border-radius: 16px; margin-bottom: 8px; max-height: 300px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
    .post-actions {
      display: flex;
      justify-content: space-around;
      color: var(--text-secondary);
      font-size: 16px;
      margin-top: 8px;
    }
    .post-actions span { cursor: pointer; display: flex; align-items: center; gap: 4px; transition: 0.2s; }
    .post-actions span:hover { color: var(--accent); }
    .post-actions span.liked { color: var(--danger); }
    .stories {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      overflow-x: auto;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
    }
    .story { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 56px; }
    .story-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
      background-size: cover;
      background-position: center;
    }
    .story-username { font-size: 11px; margin-top: 4px; color: var(--text-secondary); }
    .direct-container { display: flex; flex-direction: column; height: 100%; background: var(--bg); }
    .direct-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .direct-header h2 { font-family: var(--font-title); color: var(--accent); font-size: 22px; margin: 0; }
    .new-chat-btn { background: var(--accent); border: none; color: white; border-radius: 50%; width: 36px; height: 36px; font-size: 20px; cursor: pointer; }
    .chat-search { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
    .chat-search input { flex: 1; padding: 10px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); }
    .chat-search button { background: var(--accent); border: none; color: white; border-radius: 20px; padding: 0 16px; font-family: var(--font-title); font-size: 14px; cursor: pointer; }
    .dialog-list { flex: 1; overflow-y: auto; }
    .dialog-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .dialog-item:hover { background: rgba(29,161,242,0.05); }
    .dialog-item.unread { background: rgba(29,161,242,0.08); }
    .dialog-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; margin-right: 12px; background-size: cover; background-position: center; }
    .dialog-info { flex: 1; }
    .dialog-name { font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .unread-badge { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }
    .dialog-last-msg { color: var(--text-secondary); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dialog-time { color: var(--text-secondary); font-size: 12px; margin-left: 8px; }
    .chat-view { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
    .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-header .back-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; }
    .chat-messages { flex: 1; padding: 10px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
    .msg-sent { align-self: flex-end; background: var(--accent); color: white; }
    .msg-received { align-self: flex-start; background: var(--border); color: var(--text); }
    .msg-sender { font-size: 12px; opacity: 0.8; margin-bottom: 2px; }
    .chat-input-area { display: flex; padding: 8px 16px; gap: 8px; border-top: 1px solid var(--border); background: var(--card-bg); }
    .chat-input-area input { flex: 1; padding: 10px 16px; border-radius: 24px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .chat-input-area button { background: var(--accent); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; }
    .profile-header { background: var(--card-bg); padding: 24px 16px 16px; border-bottom: 1px solid var(--border); text-align: center; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; font-weight: bold; border: 3px solid var(--bg); background-size: cover; background-position: center; }
    .profile-stats { display: flex; justify-content: space-around; margin: 16px 0; }
    .stat { text-align: center; }
    .stat-number { font-weight: 700; font-size: 18px; }
    .stat-label { font-size: 12px; color: var(--text-secondary); }
    .profile-id { font-size: 0.85rem; color: var(--text-secondary); background: var(--bg); padding: 6px 12px; border-radius: 16px; display: inline-block; margin: 8px 0; font-family: monospace; }
    .profile-posts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 12px; }
    .profile-posts img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card-bg); border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
    .btn-outline { background: transparent; border: 1px solid var(--border); border-radius: 20px; padding: 8px 20px; cursor: pointer; color: var(--accent); font-weight: 600; }
    .notification-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
    .notification-item.unread { background: rgba(29,161,242,0.05); }
    .feed-toggle { display: flex; border-bottom: 1px solid var(--border); background: var(--card-bg); }
    .feed-toggle button { flex: 1; padding: 10px; background: none; border: none; color: var(--text-secondary); font-weight: 600; cursor: pointer; }
    .feed-toggle button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    .channel-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .channel-item:hover { background: rgba(29,161,242,0.05); }
    .channel-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: var(--border);
      display: flex; align-items: center; justify-content: center; font-weight: 700;
      color: white; margin-right: 12px; background-size: cover; background-position: center;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="logo"><span>𝕏</span>MinionSpeak</div>
    <div class="header-actions" id="headerUserActions" style="display: none;">
      <button class="icon-btn" onclick="showSection('notifications')" id="notifBell">🔔</button>
      <button class="icon-btn" onclick="showSection('profile')">👤</button>
      <button class="icon-btn" onclick="logout()">🚪</button>
    </div>
  </header>

  <div class="main-content">
    <!-- Auth -->
    <div id="auth-section" class="section active">
      <div class="auth-container">
        <h2>MinionSpeak</h2>
        <div id="login-form">
          <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
          <div class="form-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
          <button class="btn" onclick="login()">Войти</button>
          <p class="link" onclick="toggleAuth('register')">Зарегистрироваться</p>
        </div>
        <div id="register-form" style="display: none;">
          <div class="form-group"><input type="email" id="regEmail" placeholder="Email"></div>
          <div class="form-group"><input type="text" id="regUsername" placeholder="Логин"></div>
          <div class="form-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
          <button class="btn" onclick="register()">Создать аккаунт</button>
          <p class="link" onclick="toggleAuth('login')">Уже есть аккаунт? Войти</p>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed-section" class="section">
      <div class="feed-toggle" id="feedToggle">
        <button class="active" onclick="setFeedMode('all')">Все</button>
        <button onclick="setFeedMode('following')">Подписки</button>
      </div>
      <div class="stories" id="storiesContainer"></div>
      <div id="postsContainer"></div>
    </div>

    <!-- Notifications -->
    <div id="notifications-section" class="section">
      <h2 style="padding:12px 16px; border-bottom:1px solid var(--border); font-family:var(--font-title); color:var(--accent);">🔔 Уведомления</h2>
      <div id="notificationsList"></div>
    </div>

    <!-- Channels (list) -->
    <div id="channels-section" class="section">
      <div style="padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-family:var(--font-title); color:var(--accent); margin:0;">📢 Каналы</h2>
        <button class="btn" style="width:auto; padding:8px 16px;" onclick="createChannel()">＋ Создать</button>
      </div>
      <div id="popularChannels">
        <h3 style="padding:8px 16px; color:var(--text-secondary); font-size:14px;">Популярные</h3>
        <div id="popularChannelsList"></div>
      </div>
      <div id="myChannels">
        <h3 style="padding:8px 16px; color:var(--text-secondary); font-size:14px;">Мои каналы</h3>
        <div id="myChannelsList"></div>
      </div>
    </div>

    <!-- Channel detail -->
    <div id="channel-detail-section" class="section">
      <div style="padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center;">
        <button class="back-btn" onclick="showSection('channels')" style="background:none;border:none;color:var(--accent);font-size:20px;">←</button>
        <span id="channelDetailName" style="font-family:var(--font-title); color:var(--accent); margin-left:8px;"></span>
      </div>
      <div id="channelPostsContainer"></div>
    </div>

    <!-- Direct (Messages) -->
    <div id="direct-section" class="section">
      <div class="direct-container">
        <div class="direct-header">
          <h2>✉️ Сообщения</h2>
          <div style="display:flex; gap:8px;">
            <button class="new-chat-btn" onclick="showNewChatSearch()">＋</button>
            <button class="new-chat-btn" onclick="createGroupChat()">👥</button>
          </div>
        </div>
        <div class="chat-search" id="newChatSearch" style="display: none;">
          <input type="text" id="searchUserId" placeholder="Введите ID пользователя">
          <button onclick="searchUserAndChat()">Найти</button>
        </div>
        <div class="dialog-list" id="dialogList"></div>
        <div class="chat-view" id="chatView" style="display: none;">
          <div class="chat-header">
            <button class="back-btn" onclick="backToDialogList()">←</button>
            <div class="chat-partner" id="chatPartnerName"></div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Написать сообщение...">
            <button onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile -->
    <div id="profile-section" class="section">
      <div class="profile-header" id="profileInfo"></div>
      <div class="profile-posts" id="profilePosts"></div>
    </div>

    <!-- Edit Profile -->
    <div id="edit-profile-section" class="section">
      <div style="padding:16px; border-bottom:1px solid var(--border);">
        <button class="icon-btn" onclick="showSection('profile')" style="font-size:22px;">←</button>
        <span style="font-family:var(--font-title); color:var(--accent); font-size:20px; margin-left:8px;">Редактировать профиль</span>
      </div>
      <div style="padding:20px;">
        <div class="form-group">
          <label style="color:var(--text-secondary); font-size:14px;">Никнейм</label>
          <input type="text" id="editUsername" placeholder="Новый ник">
        </div>
        <div class="form-group">
          <label style="color:var(--text-secondary); font-size:14px;">О себе</label>
          <textarea id="editBio" placeholder="Расскажите о себе" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label style="color:var(--text-secondary); font-size:14px;">Аватар</label>
          <input type="file" id="editAvatar" accept="image/*">
          <img id="avatarPreview" src="" style="max-width:100px; border-radius:50%; margin-top:8px; display:none;">
        </div>
        <button class="btn" onclick="saveProfileChanges()">Сохранить</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottomNav" style="display: none;">
    <div class="nav-item active" data-section="feed" onclick="navigateTo('feed')">🏠<span>Главная</span></div>
    <div class="nav-item" data-section="channels" onclick="navigateTo('channels')">📢<span>Каналы</span></div>
    <div class="nav-item" onclick="openNewPostModal()">➕<span>Пост</span></div>
    <div class="nav-item" data-section="direct" onclick="navigateTo('direct')" id="navDirect">✉️<span>Сообщ.</span></div>
    <div class="nav-item" data-section="profile" onclick="navigateTo('profile')">👤<span>Профиль</span></div>
  </nav>

  <!-- Modals -->
  <div class="modal" id="newPostModal">
    <div class="modal-content">
      <h3>Новый пост</h3>
      <div class="form-group"><textarea id="newPostCaption" placeholder="Что происходит?"></textarea></div>
      <div class="form-group"><input type="file" id="newPostImage" accept="image/*"></div>
      <div class="form-group">
        <label style="color:var(--text-secondary);">Опубликовать в:</label>
        <select id="postTarget" style="width:100%; padding:10px; border-radius:20px; background:var(--bg); color:var(--text); border:1px solid var(--border);">
          <option value="profile">Мой профиль</option>
        </select>
      </div>
      <div class="modal-actions" style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-outline" onclick="closeNewPostModal()">Отмена</button>
        <button class="btn" style="width:auto; padding:8px 24px;" onclick="createPost()">Опубликовать</button>
      </div>
    </div>
  </div>

  <div class="modal" id="userProfileModal">
    <div class="modal-content" id="userProfileContent"></div>
  </div>

  <div class="modal" id="commentsModal">
    <div class="modal-content" id="commentsContent"></div>
  </div>

  <div class="modal" id="createChannelModal">
    <div class="modal-content">
      <h3>Создать канал</h3>
      <div class="form-group"><input type="text" id="channelName" placeholder="Название канала"></div>
      <div class="form-group"><textarea id="channelDesc" placeholder="Описание"></textarea></div>
      <div class="form-group"><input type="file" id="channelAvatar" accept="image/*"></div>
      <div class="modal-actions" style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-outline" onclick="closeCreateChannelModal()">Отмена</button>
        <button class="btn" style="width:auto; padding:8px 24px;" onclick="saveChannel()">Создать</button>
      </div>
    </div>
  </div>

  <div class="modal" id="groupChatModal">
    <div class="modal-content">
      <h3>Новая группа</h3>
      <div class="form-group"><input type="text" id="groupName" placeholder="Название группы"></div>
      <div class="form-group">
        <label>Участники (ID через запятую)</label>
        <input type="text" id="groupParticipants" placeholder="id1, id2, ...">
      </div>
      <div class="modal-actions" style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-outline" onclick="closeGroupChatModal()">Отмена</button>
        <button class="btn" style="width:auto; padding:8px 24px;" onclick="createGroup()">Создать</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ========== STORAGE ==========
  const STORAGE = {
    USERS: 'ms_users',
    PROFILES: 'ms_profiles',
    POSTS: 'ms_posts',
    LIKES: 'ms_likes',
    COMMENTS: 'ms_comments',
    FOLLOWS: 'ms_follows',
    MESSAGES: 'ms_messages',
    NOTIFICATIONS: 'ms_notifications',
    CHANNELS: 'ms_channels',
    GROUP_CHATS: 'ms_groupChats',
    CURRENT: 'ms_current',
    LAST_READ: 'ms_lastRead'
  };

  const getData = key => JSON.parse(localStorage.getItem(key) || '[]');
  const setData = (key, data) => localStorage.setItem(key, JSON.stringify(data));
  const getProfiles = () => JSON.parse(localStorage.getItem(STORAGE.PROFILES) || '{}');
  const setProfiles = data => localStorage.setItem(STORAGE.PROFILES, JSON.stringify(data));

  let currentUser = JSON.parse(localStorage.getItem(STORAGE.CURRENT) || 'null');
  let feedMode = 'all';
  let activeChatId = null;
  let activeChatType = 'direct'; // 'direct' or 'group'

  if (!localStorage.getItem(STORAGE.PROFILES)) setProfiles({});
  if (!localStorage.getItem(STORAGE.CHANNELS)) setData(STORAGE.CHANNELS, []);
  if (!localStorage.getItem(STORAGE.GROUP_CHATS)) setData(STORAGE.GROUP_CHATS, []);

  // ========== UI ==========
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id + '-section').classList.add('active');
    document.querySelectorAll('.nav-item[data-section]').forEach(el => {
      el.classList.toggle('active', el.dataset.section === id);
    });
    if (id === 'feed') { loadFeed(); renderStories(); }
    if (id === 'notifications') loadNotifications();
    if (id === 'channels') loadChannels();
    if (id === 'direct') { renderDialogList(); backToDialogList(); }
    if (id === 'profile') loadProfile(currentUser.id);
    if (id === 'edit-profile') initEditProfileForm();
  }
  function navigateTo(section) { showSection(section); }

  function toggleAuth(form) {
    document.getElementById('login-form').style.display = form === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = form === 'register' ? 'block' : 'none';
  }

  // ========== AUTH ==========
  async function register() {
    const email = document.getElementById('regEmail').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!email || !username || !password) return alert('Заполни все поля');
    const users = getData(STORAGE.USERS);
    if (users.some(u => u.email === email)) return alert('Email занят');
    if (users.some(u => u.username === username)) return alert('Логин занят');
    const user = { id: Date.now().toString(36)+Math.random().toString(36).substr(2), email, username, password };
    users.push(user); setData(STORAGE.USERS, users);
    const profiles = getProfiles(); profiles[user.id] = { avatar:'', cover:'', bio:'' }; setProfiles(profiles);
    onLoginSuccess(user);
  }
  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const user = getData(STORAGE.USERS).find(u => u.email === email && u.password === password);
    if (!user) return alert('Неверные данные');
    onLoginSuccess(user);
  }
  function onLoginSuccess(user) {
    currentUser = user;
    localStorage.setItem(STORAGE.CURRENT, JSON.stringify(user));
    document.getElementById('auth-section').classList.remove('active');
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('headerUserActions').style.display = 'flex';
    showSection('feed');
    clearAuthFields();
  }
  function logout() {
    currentUser = null;
    localStorage.removeItem(STORAGE.CURRENT);
    document.getElementById('auth-section').classList.add('active');
    document.getElementById('bottomNav').style.display = 'none';
    document.getElementById('headerUserActions').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  }
  if (currentUser) {
    document.getElementById('auth-section').classList.remove('active');
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('headerUserActions').style.display = 'flex';
    showSection('feed');
  }
  function clearAuthFields() { ['loginEmail','loginPassword','regEmail','regUsername','regPassword'].forEach(id => { const e=document.getElementById(id); if(e) e.value=''; }); }

  // ========== FEED ==========
  function setFeedMode(mode) {
    feedMode = mode;
    document.querySelectorAll('#feedToggle button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadFeed();
  }

  function openNewPostModal() {
    const modal = document.getElementById('newPostModal');
    // заполнить селект каналов, где пользователь администратор
    const select = document.getElementById('postTarget');
    select.innerHTML = '<option value="profile">Мой профиль</option>';
    const channels = getData(STORAGE.CHANNELS).filter(c => c.creatorId === currentUser.id);
    channels.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = 'Канал: ' + c.name;
      select.appendChild(opt);
    });
    modal.classList.add('active');
  }
  function closeNewPostModal() {
    document.getElementById('newPostModal').classList.remove('active');
    document.getElementById('newPostCaption').value = '';
    document.getElementById('newPostImage').value = '';
    document.getElementById('postTarget').value = 'profile';
  }

  function createPost() {
    const caption = document.getElementById('newPostCaption').value.trim();
    const fileInput = document.getElementById('newPostImage');
    const file = fileInput.files[0];
    if (!file) return alert('Прикрепи изображение');
    const target = document.getElementById('postTarget').value; // 'profile' или channelId
    const reader = new FileReader();
    reader.onload = e => {
      const post = {
        id: Date.now().toString(36)+Math.random().toString(36).substr(2),
        userId: currentUser.id,
        username: currentUser.username,
        caption,
        imageUrl: e.target.result,
        createdAt: new Date().toISOString(),
        channelId: target !== 'profile' ? target : null
      };
      const posts = getData(STORAGE.POSTS);
      posts.unshift(post);
      setData(STORAGE.POSTS, posts);
      closeNewPostModal();
      if (document.getElementById('feed-section').classList.contains('active')) loadFeed();
      if (document.getElementById('profile-section').classList.contains('active')) loadProfile(currentUser.id);
      if (document.getElementById('channel-detail-section').classList.contains('active') && target !== 'profile') loadChannelDetail(target);
    };
    reader.readAsDataURL(file);
  }

  function loadFeed() {
    const posts = getData(STORAGE.POSTS).filter(post => {
      if (feedMode === 'following') {
        if (post.channelId) {
          const channel = getData(STORAGE.CHANNELS).find(c => c.id === post.channelId);
          return channel && channel.subscribers && channel.subscribers.includes(currentUser.id);
        }
        const follows = getData(STORAGE.FOLLOWS).filter(f => f.followerId === currentUser.id);
        const followingIds = follows.map(f => f.followingId);
        return followingIds.includes(post.userId) || post.userId === currentUser.id;
      }
      return true; // все
    });
    const likes = getData(STORAGE.LIKES);
    const container = document.getElementById('postsContainer');
    if (!posts.length) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);">Лента пуста</div>';
      return;
    }
    container.innerHTML = posts.map(post => renderPostHTML(post, likes)).join('');
  }

  function renderPostHTML(post, likes) {
    const postLikes = likes.filter(l => l.postId === post.id);
    const liked = postLikes.some(l => l.userId === currentUser.id);
    let avatarStyle, displayName, handle;
    if (post.channelId) {
      const channel = getData(STORAGE.CHANNELS).find(c => c.id === post.channelId);
      displayName = channel ? channel.name : 'Канал';
      handle = channel ? '@' + channel.name.toLowerCase().replace(/\s/g, '') : '@channel';
      avatarStyle = channel && channel.avatar ? `background-image:url(${channel.avatar})` : `background:var(--accent)`;
    } else {
      const profile = getProfiles()[post.userId] || {};
      displayName = post.username;
      handle = '@' + post.username.toLowerCase().replace(/\s/g, '');
      avatarStyle = profile.avatar ? `background-image:url(${profile.avatar})` : `background:${stringToColor(post.username)}`;
    }
    const headerClickHandler = post.channelId ? `showChannelDetail('${post.channelId}')` : `showUserProfile('${post.userId}')`;
    return `
      <div class="post" id="post-${post.id}">
        <div class="post-header">
          <div class="post-avatar" style="${avatarStyle}" onclick="${headerClickHandler}">${post.channelId ? '' : post.username.charAt(0).toUpperCase()}</div>
          <div class="post-user-info" onclick="${headerClickHandler}">
            <div class="post-username">${escapeHtml(displayName)}</div>
            <div class="post-handle">${handle} · ${formatTime(post.createdAt)}</div>
          </div>
          ${post.userId === currentUser.id && !post.channelId ? `<button class="icon-btn" onclick="deletePost('${post.id}')" style="color:var(--danger); font-size:18px;">🗑️</button>` : ''}
        </div>
        ${post.caption ? `<div class="post-caption">${escapeHtml(post.caption)}</div>` : ''}
        <img class="post-image" src="${post.imageUrl}" onclick="openImageModal('${post.imageUrl}')">
        <div class="post-actions">
          <span onclick="openComments('${post.id}')">💬 ${(getData(STORAGE.COMMENTS).filter(c=>c.postId===post.id)).length}</span>
          <span>🔁</span>
          <span onclick="toggleLike('${post.id}')" class="${liked?'liked':''}">${liked?'❤️':'🤍'} ${postLikes.length}</span>
          <span>↗️</span>
        </div>
      </div>
    `;
  }

  // ========== CHANNELS ==========
  function loadChannels() {
    const channels = getData(STORAGE.CHANNELS);
    // Популярные
    const popular = [...channels].sort((a,b) => (b.subscribers?.length||0) - (a.subscribers?.length||0));
    renderChannelList('popularChannelsList', popular);
    // Мои каналы (где я создатель)
    const my = channels.filter(c => c.creatorId === currentUser.id);
    renderChannelList('myChannelsList', my);
  }

  function renderChannelList(containerId, channels) {
    const container = document.getElementById(containerId);
    if (!channels.length) {
      container.innerHTML = '<div style="padding:10px; color:var(--text-secondary);">Нет каналов</div>';
      return;
    }
    container.innerHTML = channels.map(c => {
      const subCount = c.subscribers ? c.subscribers.length : 0;
      const isSubscribed = c.subscribers && c.subscribers.includes(currentUser.id);
      return `
        <div class="channel-item" onclick="showChannelDetail('${c.id}')">
          <div class="channel-avatar" style="background:${c.avatar ? `url(${c.avatar})` : stringToColor(c.name)}">${c.avatar ? '' : c.name.charAt(0).toUpperCase()}</div>
          <div style="flex:1;">
            <div style="font-weight:600;">${escapeHtml(c.name)}</div>
            <div style="color:var(--text-secondary); font-size:13px;">${subCount} подписчиков</div>
          </div>
          <button class="btn-outline" style="width:auto;" onclick="event.stopPropagation(); toggleChannelSubscription('${c.id}')">
            ${isSubscribed ? 'Выйти' : 'Подписаться'}
          </button>
        </div>
      `;
    }).join('');
  }

  function toggleChannelSubscription(channelId) {
    const channels = getData(STORAGE.CHANNELS);
    const idx = channels.findIndex(c => c.id === channelId);
    if (idx === -1) return;
    if (!channels[idx].subscribers) channels[idx].subscribers = [];
    const subs = channels[idx].subscribers;
    const pos = subs.indexOf(currentUser.id);
    if (pos > -1) subs.splice(pos, 1);
    else subs.push(currentUser.id);
    setData(STORAGE.CHANNELS, channels);
    loadChannels();
    loadFeed(); // обновить ленту (подписки)
  }

  function showChannelDetail(channelId) {
    const channel = getData(STORAGE.CHANNELS).find(c => c.id === channelId);
    if (!channel) return;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('channel-detail-section').classList.add('active');
    document.getElementById('channelDetailName').textContent = channel.name;
    loadChannelDetail(channelId);
  }

  function loadChannelDetail(channelId) {
    const posts = getData(STORAGE.POSTS).filter(p => p.channelId === channelId);
    const container = document.getElementById('channelPostsContainer');
    if (!posts.length) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);">Нет постов</div>';
      return;
    }
    container.innerHTML = posts.map(post => renderPostHTML(post, getData(STORAGE.LIKES))).join('');
  }

  function createChannel() {
    document.getElementById('createChannelModal').classList.add('active');
  }
  function closeCreateChannelModal() {
    document.getElementById('createChannelModal').classList.remove('active');
    document.getElementById('channelName').value = '';
    document.getElementById('channelDesc').value = '';
    document.getElementById('channelAvatar').value = '';
  }
  function saveChannel() {
    const name = document.getElementById('channelName').value.trim();
    const desc = document.getElementById('channelDesc').value.trim();
    const avatarFile = document.getElementById('channelAvatar').files[0];
    if (!name) return alert('Введите название');
    const channels = getData(STORAGE.CHANNELS);
    const channel = {
      id: Date.now().toString(36)+Math.random().toString(36).substr(2),
      name, description: desc,
      creatorId: currentUser.id,
      subscribers: [currentUser.id],
      avatar: ''
    };
    if (avatarFile) {
      const reader = new FileReader();
      reader.onload = e => {
        channel.avatar = e.target.result;
        channels.push(channel);
        setData(STORAGE.CHANNELS, channels);
        closeCreateChannelModal();
        loadChannels();
      };
      reader.readAsDataURL(avatarFile);
    } else {
      channels.push(channel);
      setData(STORAGE.CHANNELS, channels);
      closeCreateChannelModal();
      loadChannels();
    }
  }

  // ========== DIRECT & GROUP CHATS ==========
  function showNewChatSearch() {
    const div = document.getElementById('newChatSearch');
    div.style.display = div.style.display === 'flex' ? 'none' : 'flex';
  }

  function searchUserAndChat() {
    const raw = document.getElementById('searchUserId').value;
    const id = raw.replace(/\s/g, '');
    if (!id) return alert('Введите ID');
    if (id === currentUser.id) return alert('Нельзя написать себе');
    const user = getData(STORAGE.USERS).find(u => u.id === id);
    if (!user) return alert('Пользователь не найден');
    const chatId = [currentUser.id, user.id].sort().join('_');
    activeChatId = chatId;
    activeChatType = 'direct';
    document.getElementById('searchUserId').value = '';
    document.getElementById('newChatSearch').style.display = 'none';
    openChatView('direct', chatId, user.username);
  }

  function createGroupChat() {
    document.getElementById('groupChatModal').classList.add('active');
  }
  function closeGroupChatModal() {
    document.getElementById('groupChatModal').classList.remove('active');
  }
  function createGroup() {
    const name = document.getElementById('groupName').value.trim();
    const participantsRaw = document.getElementById('groupParticipants').value;
    const ids = participantsRaw.split(',').map(s => s.trim()).filter(s => s);
    if (!name) return alert('Введите название');
    if (ids.length < 2) return alert('Добавьте хотя бы 2 участников');
    // проверяем, что все id существуют и не дублируются
    const allUsers = getData(STORAGE.USERS);
    const uniqueIds = [...new Set(ids)];
    if (uniqueIds.some(id => !allUsers.find(u => u.id === id))) return alert('Некорректный ID участника');
    // добавляем себя
    if (!uniqueIds.includes(currentUser.id)) uniqueIds.push(currentUser.id);
    const groupChats = getData(STORAGE.GROUP_CHATS);
    const group = {
      id: 'group_' + Date.now().toString(36),
      name,
      creatorId: currentUser.id,
      participants: uniqueIds,
      avatar: ''
    };
    groupChats.push(group);
    setData(STORAGE.GROUP_CHATS, groupChats);
    closeGroupChatModal();
    activeChatId = group.id;
    activeChatType = 'group';
    openChatView('group', group.id, name);
  }

  function getDialogs() {
    const messages = getData(STORAGE.MESSAGES);
    const groupChats = getData(STORAGE.GROUP_CHATS);
    const dialogs = [];

    // личные чаты
    const directChatIds = new Set();
    messages.forEach(m => {
      if (!m.isGroup && m.chatId && m.chatId.includes(currentUser.id)) {
        directChatIds.add(m.chatId);
      }
    });
    directChatIds.forEach(chatId => {
      const ids = chatId.split('_');
      const partnerId = ids.find(id => id !== currentUser.id);
      const partner = getData(STORAGE.USERS).find(u => u.id === partnerId);
      if (!partner) return;
      const lastMsg = messages.filter(m => m.chatId === chatId && !m.isGroup).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt))[0];
      dialogs.push({ id: chatId, type: 'direct', name: partner.username, avatar: '', lastMsg });
    });

    // групповые чаты
    const userGroups = groupChats.filter(g => g.participants.includes(currentUser.id));
    userGroups.forEach(g => {
      const lastMsg = messages.filter(m => m.chatId === g.id && m.isGroup).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt))[0];
      dialogs.push({ id: g.id, type: 'group', name: g.name, avatar: g.avatar, lastMsg });
    });

    dialogs.sort((a,b) => {
      const timeA = a.lastMsg ? new Date(a.lastMsg.createdAt) : 0;
      const timeB = b.lastMsg ? new Date(b.lastMsg.createdAt) : 0;
      return timeB - timeA;
    });
    return dialogs;
  }

  function renderDialogList() {
    const container = document.getElementById('dialogList');
    container.style.display = 'block';
    document.getElementById('chatView').style.display = 'none';
    const dialogs = getDialogs();
    if (!dialogs.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-secondary);">Нет чатов</div>';
      return;
    }
    container.innerHTML = dialogs.map(d => `
      <div class="dialog-item" onclick="openDialog('${d.id}', '${d.type}')">
        <div class="dialog-avatar" style="background:${d.avatar ? `url(${d.avatar})` : stringToColor(d.name)}">${d.avatar ? '' : d.name.charAt(0).toUpperCase()}</div>
        <div class="dialog-info">
          <div class="dialog-name">${escapeHtml(d.name)}</div>
          <div class="dialog-last-msg">${d.lastMsg ? escapeHtml(d.lastMsg.text) : ''}</div>
        </div>
        <div class="dialog-time">${d.lastMsg ? formatTime(d.lastMsg.createdAt) : ''}</div>
      </div>
    `).join('');
  }

  function openDialog(chatId, type) {
    activeChatId = chatId;
    activeChatType = type;
    const partnerName = type === 'direct' ? 
      getData(STORAGE.USERS).find(u => u.id === chatId.split('_').find(id => id !== currentUser.id))?.username || '' :
      getData(STORAGE.GROUP_CHATS).find(g => g.id === chatId)?.name || '';
    openChatView(type, chatId, partnerName);
  }

  function openChatView(type, chatId, name) {
    document.getElementById('dialogList').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('chatPartnerName').textContent = name;
    loadMessages();
  }

  function backToDialogList() {
    activeChatId = null;
    document.getElementById('chatView').style.display = 'none';
    renderDialogList();
  }

  function loadMessages() {
    if (!activeChatId) return;
    const msgs = getData(STORAGE.MESSAGES).filter(m => m.chatId === activeChatId && (m.isGroup || !m.isGroup) && m.chatId).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    document.getElementById('chatMessages').innerHTML = msgs.map(m => {
      const sender = getData(STORAGE.USERS).find(u => u.id === m.senderId);
      const name = sender ? sender.username : '?';
      const cls = m.senderId === currentUser.id ? 'msg-sent' : 'msg-received';
      return `<div class="msg-bubble ${cls}">${m.senderId !== currentUser.id ? `<div class="msg-sender">${escapeHtml(name)}</div>` : ''}${escapeHtml(m.text)}</div>`;
    }).join('');
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !activeChatId) return;
    const msgs = getData(STORAGE.MESSAGES);
    msgs.push({
      id: Date.now().toString(),
      chatId: activeChatId,
      senderId: currentUser.id,
      text,
      createdAt: new Date().toISOString(),
      isGroup: activeChatType === 'group'
    });
    setData(STORAGE.MESSAGES, msgs);
    input.value = '';
    loadMessages();
    // Для групповых чатов можно добавить уведомления участникам (опционально)
  }

  // ========== HELPERS ==========
  function escapeHtml(text) { return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]); }
  function stringToColor(str) { let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h); return '#'+(h&0xFFFFFF).toString(16).padStart(6,'0'); }
  function formatTime(iso) { const d=new Date(iso), now=new Date(); if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); else if((now-d)<172800000) return 'Вчера'; else return d.toLocaleDateString(); }
  function openImageModal(url) { window.open(url, '_blank'); }

  // Периодические обновления
  setInterval(() => {
    if (!currentUser) return;
    if (document.getElementById('feed-section').classList.contains('active')) loadFeed();
    if (document.getElementById('notifications-section').classList.contains('active')) loadNotifications();
    if (document.getElementById('direct-section').classList.contains('active')) {
      if (!activeChatId) renderDialogList();
      else loadMessages();
    }
    updateNotificationBadge();
  }, 2000);
</script>
