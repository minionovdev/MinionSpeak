<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyLingo — Изучение Python</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #222236;
            --accent: #58cc02;
            --accent2: #46a302;
            --gold: #ffc800;
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --red: #ff4b4b;
            --blue: #4da6ff;
            --orange: #ff8c42;
            --purple: #b066ff;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            max-height: 850px;
            background: var(--surface);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--surface2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            gap: 10px;
            flex-shrink: 0;
        }
        .topbar .logo {
            font-weight: 800;
            font-size: 1.2em;
            letter-spacing: -0.5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .topbar .logo span {
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            font-size: 0.9em;
            background: var(--surface);
            padding: 7px 12px;
            border-radius: 20px;
        }
        .stat.xp {
            color: var(--gold);
        }
        .stat.streak {
            color: var(--orange);
        }
        .stat .icon {
            font-size: 1.1em;
        }
        .mode-badge {
            font-size: 0.75em;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .mode-badge.student {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .mode-badge.pro {
            background: #1a1a3e;
            color: #b066ff;
            border: 1px solid #b066ff44;
        }

        /* CONTENT */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 4px;
        }

        /* SCREENS */
        .screen {
            display: none;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            animation: fadeSlide 0.35s ease;
        }
        .screen.active {
            display: flex;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* WELCOME */
        .welcome {
            text-align: center;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .welcome h1 {
            font-size: 2.4em;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .welcome h1 .py {
            color: var(--accent);
        }
        .welcome p {
            color: var(--text2);
            font-size: 1em;
            max-width: 350px;
            line-height: 1.5;
        }
        .choice-cards {
            display: flex;
            gap: 14px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }
        .choice-card {
            flex: 1;
            min-width: 140px;
            max-width: 200px;
            background: var(--surface2);
            border: 2px solid transparent;
            border-radius: var(--radius);
            padding: 20px 16px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .choice-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(88, 204, 2, 0.2);
        }
        .choice-card.pro-choice:hover {
            border-color: var(--purple);
            box-shadow: 0 12px 30px rgba(176, 102, 255, 0.25);
        }
        .choice-card .emoji {
            font-size: 3em;
        }
        .choice-card h3 {
            font-weight: 700;
            font-size: 1.1em;
        }
        .choice-card small {
            color: var(--text2);
            font-size: 0.8em;
            line-height: 1.4;
        }
        .choice-card .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag.beginner {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .tag.advanced {
            background: #1a1a3e;
            color: #b066ff;
        }

        /* PATH */
        .unit-block {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 14px;
            border-left: 4px solid var(--accent);
        }
        .unit-block.pro-unit {
            border-left-color: var(--purple);
        }
        .unit-block h4 {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 0.95em;
        }
        .unit-block .unit-desc {
            font-size: 0.78em;
            color: var(--text2);
            margin-bottom: 10px;
        }
        .lesson-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .lesson-node {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8em;
            transition: var(--transition);
            position: relative;
            border: 3px solid transparent;
            background: var(--surface);
            color: var(--text2);
            flex-shrink: 0;
        }
        .lesson-node.completed {
            background: var(--accent2);
            color: #fff;
            border-color: var(--accent);
            cursor: pointer;
        }
        .lesson-node.current {
            border-color: var(--gold);
            animation: pulse 2s infinite;
            cursor: pointer;
            color: #fff;
            background: var(--surface);
        }
        .lesson-node.locked {
            opacity: 0.4;
            cursor: not-allowed;
            color: #555;
        }
        .lesson-node.pro-completed {
            background: #5c3d99;
            color: #fff;
            border-color: var(--purple);
            cursor: pointer;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 200, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(255, 200, 0, 0);
            }
        }

        /* LESSON VIEW */
        .lesson-theory {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 16px;
            line-height: 1.6;
            font-size: 0.9em;
        }
        .lesson-theory h3 {
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .lesson-theory code {
            background: #00000044;
            padding: 3px 7px;
            border-radius: 5px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
            color: #ffcc80;
        }
        .lesson-theory pre {
            background: #0a0a18;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.82em;
            color: #c8e6c9;
            margin: 8px 0;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* EXERCISE */
        .exercise-box {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 16px;
            border: 2px solid transparent;
            transition: var(--transition);
        }
        .exercise-box.correct {
            border-color: var(--accent) !important;
            animation: correctGlow 0.6s ease;
        }
        .exercise-box.wrong {
            border-color: var(--red) !important;
            animation: shake 0.5s ease;
        }
        @keyframes correctGlow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(88, 204, 2, 0.4);
            }
            50% {
                box-shadow: 0 0 40px rgba(88, 204, 2, 0.7);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            50% {
                transform: translateX(8px);
            }
            75% {
                transform: translateX(-4px);
            }
        }
        .exercise-box .q {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        .exercise-box textarea {
            width: 100%;
            min-height: 90px;
            background: #0a0a18;
            border: 1px solid #333;
            border-radius: var(--radius-sm);
            color: #c8e6c9;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85em;
            padding: 10px;
            resize: vertical;
            line-height: 1.5;
        }
        .exercise-box textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 204, 2, 0.15);
        }
        .mc-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .mc-option {
            padding: 12px 14px;
            background: var(--surface);
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9em;
            text-align: left;
            font-weight: 500;
        }
        .mc-option:hover {
            border-color: #666;
            background: #252540;
        }
        .mc-option.selected {
            border-color: var(--blue);
            background: #1a2a40;
        }
        .mc-option.correct-choice {
            border-color: var(--accent) !important;
            background: #1a3a1a !important;
        }
        .mc-option.wrong-choice {
            border-color: var(--red) !important;
            background: #3a1a1a !important;
        }

        /* BUTTONS */
        .btn {
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 0.9em;
            transition: var(--transition);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover {
            background: #6be010;
            transform: scale(1.04);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover {
            background: rgba(88, 204, 2, 0.1);
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 0.8em;
            border-radius: 20px;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* FEEDBACK */
        .feedback {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85em;
            text-align: center;
            display: none;
        }
        .feedback.show {
            display: block;
            animation: fadeSlide 0.3s ease;
        }
        .feedback.success {
            background: #1a3a1a;
            color: #6be010;
        }
        .feedback.error {
            background: #3a1a1a;
            color: #ff6b6b;
        }

        /* SANDBOX OUTPUT */
        .sandbox-output {
            background: #0a0a18;
            border-radius: var(--radius-sm);
            padding: 10px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.8em;
            color: #aaa;
            min-height: 30px;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* CONFETTI (simple) */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999;
            width: 100%;
            height: 100%;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 3px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% {
                transform: translateY(-60px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* RESPONSIVE */
        @media (max-width: 540px) {
            .app {
                border-radius: 0;
                max-height: 100vh;
            }
            .choice-cards {
                flex-direction: column;
                align-items: center;
            }
            .choice-card {
                max-width: 100%;
                width: 100%;
            }
            .lesson-node {
                width: 40px;
                height: 40px;
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- TOP BAR -->
        <div class="topbar" id="topbar">
            <div class="logo"><span>🐍</span> PyLingo</div>
            <div class="stat xp"><span class="icon">⚡</span> <span id="xpDisplay">0 XP</span></div>
            <div class="stat streak"><span class="icon">🔥</span> <span id="streakDisplay">0</span></div>
            <div class="mode-badge student" id="modeBadge">👨‍🎓 Студент</div>
        </div>

        <!-- CONTENT -->
        <div class="content" id="content"></div>

        <!-- CONFETTI CONTAINER -->
        <div class="confetti-container" id="confettiContainer"></div>
    </div>

    <script>
        (function() {
            // ============ SIMPLE PYTHON INTERPRETER ============
            class SimplePython {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.vars = {};
                    this.output = [];
                    this.lists = {};
                }
                run(code) {
                    this.reset();
                    const lines = code.split('\n');
                    let i = 0;
                    while (i < lines.length) {
                        const line = lines[i];
                        const trimmed = line.trim();
                        if (!trimmed || trimmed.startsWith('#')) { i++; continue; }

                        // for loop
                        const forMatch = trimmed.match(/^for\s+(\w+)\s+in\s+range\s*\(\s*(\d+)\s*\)\s*:/);
                        if (forMatch) {
                            const varName = forMatch[1];
                            const count = parseInt(forMatch[2]);
                            const bodyLines = [];
                            i++;
                            while (i < lines.length && (lines[i].startsWith('    ') || lines[i].startsWith('\t') ||
                                    lines[i].trim() === '')) {
                                const bl = lines[i].trim();
                                if (bl) bodyLines.push(bl);
                                i++;
                            }
                            for (let n = 0; n < count; n++) {
                                this.vars[varName] = n;
                                for (const bl of bodyLines) {
                                    this.executeLine(bl);
                                }
                            }
                            continue;
                        }

                        // if/elif/else
                        const ifMatch = trimmed.match(/^if\s+(.+)\s*:/);
                        if (ifMatch) {
                            const condition = ifMatch[1];
                            const ifBody = [];
                            const elifBodies = [];
                            const elifConditions = [];
                            let elseBody = null;
                            i++;
                            while (i < lines.length && (lines[i].startsWith('    ') || lines[i].startsWith('\t') ||
                                    lines[i].trim() === '')) {
                                const bl = lines[i].trim();
                                if (bl) ifBody.push(bl);
                                i++;
                            }
                            // Check elif/else
                            while (i < lines.length) {
                                const elifMatch = lines[i].trim().match(/^elif\s+(.+)\s*:/);
                                const elseMatch = lines[i].trim().match(/^else\s*:/);
                                if (elifMatch) {
                                    elifConditions.push(elifMatch[1]);
                                    const eBody = [];
                                    i++;
                                    while (i < lines.length && (lines[i].startsWith('    ') || lines[i]
                                            .startsWith('\t') || lines[i].trim() === '')) {
                                        const bl = lines[i].trim();
                                        if (bl) eBody.push(bl);
                                        i++;
                                    }
                                    elifBodies.push(eBody);
                                } else if (elseMatch) {
                                    elseBody = [];
                                    i++;
                                    while (i < lines.length && (lines[i].startsWith('    ') || lines[i]
                                            .startsWith('\t') || lines[i].trim() === '')) {
                                        const bl = lines[i].trim();
                                        if (bl) elseBody.push(bl);
                                        i++;
                                    }
                                    break;
                                } else {
                                    break;
                                }
                            }
                            if (this.evalCondition(condition)) {
                                for (const bl of ifBody) this.executeLine(bl);
                            } else {
                                let executed = false;
                                for (let ei = 0; ei < elifConditions.length; ei++) {
                                    if (this.evalCondition(elifConditions[ei])) {
                                        for (const bl of elifBodies[ei]) this.executeLine(bl);
                                        executed = true;
                                        break;
                                    }
                                }
                                if (!executed && elseBody) {
                                    for (const bl of elseBody) this.executeLine(bl);
                                }
                            }
                            continue;
                        }

                        this.executeLine(trimmed);
                        i++;
                    }
                    return this.output.join('\n');
                }
                executeLine(line) {
                    // print()
                    const printMatch = line.match(/^print\s*\(\s*(.+)\s*\)\s*$/);
                    if (printMatch) {
                        const val = this.evalExpr(printMatch[1]);
                        this.output.push(String(val));
                        return;
                    }
                    // assignment
                    const assignMatch = line.match(/^(\w+)\s*=\s*(.+)$/);
                    if (assignMatch) {
                        const varName = assignMatch[1];
                        const expr = assignMatch[2];
                        const val = this.evalExpr(expr);
                        this.vars[varName] = val;
                        if (Array.isArray(val)) this.lists[varName] = val;
                        return;
                    }
                    // list append
                    const appendMatch = line.match(/^(\w+)\s*\.\s*append\s*\(\s*(.+)\s*\)\s*$/);
                    if (appendMatch && this.lists[appendMatch[1]] !== undefined) {
                        const val = this.evalExpr(appendMatch[2]);
                        this.lists[appendMatch[1]].push(val);
                        this.vars[appendMatch[1]] = this.lists[appendMatch[1]];
                        return;
                    }
                }
                evalExpr(expr) {
                    expr = expr.trim();
                    // string literal
                    if ((expr.startsWith('"') && expr.endsWith('"')) || (expr.startsWith("'") && expr.endsWith("'"))) {
                        return expr.slice(1, -1);
                    }
                    // f-string
                    if (expr.startsWith('f"') && expr.endsWith('"')) {
                        let inner = expr.slice(2, -1);
                        inner = inner.replace(/\{(\w+)\}/g, (_, v) => this.vars[v] !== undefined ? this.vars[v] : '{' + v +
                            '}');
                        return inner;
                    }
                    // list literal
                    if (expr.startsWith('[') && expr.endsWith(']')) {
                        const inner = expr.slice(1, -1).trim();
                        if (!inner) return [];
                        const items = inner.split(',').map(s => this.evalExpr(s.trim()));
                        return items;
                    }
                    // int() conversion
                    const intMatch = expr.match(/^int\s*\(\s*(.+)\s*\)\s*$/);
                    if (intMatch) return parseInt(this.evalExpr(intMatch[1])) || 0;
                    // str() conversion
                    const strMatch = expr.match(/^str\s*\(\s*(.+)\s*\)\s*$/);
                    if (strMatch) return String(this.evalExpr(strMatch[1]));
                    // len()
                    const lenMatch = expr.match(/^len\s*\(\s*(\w+)\s*\)\s*$/);
                    if (lenMatch && this.lists[lenMatch[1]] !== undefined) return this.lists[lenMatch[1]].length;
                    if (lenMatch && typeof this.vars[lenMatch[1]] === 'string') return this.vars[lenMatch[1]].length;
                    if (lenMatch && Array.isArray(this.vars[lenMatch[1]])) return this.vars[lenMatch[1]].length;
                    // number
                    if (/^-?\d+\.?\d*$/.test(expr)) return parseFloat(expr);
                    // variable
                    if (this.vars[expr] !== undefined) return this.vars[expr];
                    // arithmetic
                    try {
                        const arithMatch = expr.match(/^(.+)\s*([+\-*/])\s*(.+)$/);
                        if (arithMatch && !expr.includes('"') && !expr.includes("'")) {
                            const left = this.evalExpr(arithMatch[1].trim());
                            const right = this.evalExpr(arithMatch[3].trim());
                            const op = arithMatch[2];
                            if (typeof left === 'number' && typeof right === 'number') {
                                switch (op) {
                                    case '+':
                                        return left + right;
                                    case '-':
                                        return left - right;
                                    case '*':
                                        return left * right;
                                    case '/':
                                        return right !== 0 ? left / right : 0;
                                }
                            }
                            if (op === '+' && (typeof left === 'string' || typeof right === 'string')) return String(
                                left) + String(right);
                        }
                    } catch (e) {}
                    return expr;
                }
                evalCondition(cond) {
                    cond = cond.trim();
                    // comparison
                    const compMatch = cond.match(/^(.+?)\s*(==|!=|>=|<=|>|<)\s*(.+)$/);
                    if (compMatch) {
                        const left = this.evalExpr(compMatch[1].trim());
                        const right = this.evalExpr(compMatch[3].trim());
                        switch (compMatch[2]) {
                            case '==':
                                return left == right;
                            case '!=':
                                return left != right;
                            case '>':
                                return Number(left) > Number(right);
                            case '<':
                                return Number(left) < Number(right);
                            case '>=':
                                return Number(left) >= Number(right);
                            case '<=':
                                return Number(left) <= Number(right);
                        }
                    }
                    // Check if variable is truthy
                    if (this.vars[cond] !== undefined) return Boolean(this.vars[cond]);
                    return cond === 'True' || cond === 'true';
                }
            }

            // ============ DOM REFS ============
            const content = document.getElementById('content');
            const xpDisplay = document.getElementById('xpDisplay');
            const streakDisplay = document.getElementById('streakDisplay');
            const modeBadge = document.getElementById('modeBadge');
            const confettiContainer = document.getElementById('confettiContainer');

            // ============ HELPERS ============
            function saveState() {
                localStorage.setItem('pylingo_state', JSON.stringify({
                    mode: state.mode,
                    xp: state.xp,
                    streak: state.streak,
                    lastLessonDate: state.lastLessonDate,
                    completedLessons: state.completedLessons,
                }));
            }

            function loadState() {
                const saved = localStorage.getItem('pylingo_state');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        state.mode = data.mode || null;
                        state.xp = data.xp || 0;
                        state.streak = data.streak || 0;
                        state.lastLessonDate = data.lastLessonDate || null;
                        state.completedLessons = data.completedLessons || {};
                    } catch (e) {
                        console.log('Ошибка загрузки состояния');
                    }
                }
            }

            function updateTopBar() {
                xpDisplay.textContent = state.xp + ' XP';
                streakDisplay.textContent = state.streak;
                if (state.mode === 'pro') {
                    modeBadge.textContent = '⚡ PRO';
                    modeBadge.className = 'mode-badge pro';
                } else if (state.mode === 'student') {
                    modeBadge.textContent = '👨‍🎓 Студент';
                    modeBadge.className = 'mode-badge student';
                } else {
                    modeBadge.textContent = '❓ Выбор';
                    modeBadge.className = 'mode-badge student';
                }
            }

            function getUnitData() {
                if (!state.mode) return [];
                return lessonData[state.mode].units;
            }

            function makeLessonKey(unitId, lessonId) {
                return state.mode + '-' + unitId + '-' + lessonId;
            }

            function isLessonCompleted(unitId, lessonId) {
                return state.completedLessons[makeLessonKey(unitId, lessonId)] === true;
            }

            function completeLesson(unitId, lessonId) {
                state.completedLessons[makeLessonKey(unitId, lessonId)] = true;
                state.xp += 15;
                // Streak
                const today = new Date().toDateString();
                if (state.lastLessonDate !== today) {
                    if (state.lastLessonDate) {
                        const yesterday = new Date(Date.now() - 86400000).toDateString();
                        if (state.lastLessonDate === yesterday) {
                            state.streak += 1;
                        } else {
                            state.streak = 1;
                        }
                    } else {
                        state.streak = 1;
                    }
                    state.lastLessonDate = today;
                }
                saveState();
                updateTopBar();
            }

            function getNextLesson() {
                const units = getUnitData();
                for (const unit of units) {
                    for (const lesson of unit.lessons) {
                        if (!isLessonCompleted(unit.id, lesson.id)) {
                            return { unit, lesson, unitId: unit.id, lessonId: lesson.id };
                        }
                    }
                }
                return null; // All completed
            }

            function renderScreen(screenName, data = {}) {
                state.currentScreen = screenName;
                state.currentLessonKey = data.lessonKey || null;
                state.currentExerciseIndex = 0;
                state.exerciseAttempts = 0;
                content.innerHTML = '';
                const screen = document.createElement('div');
                screen.className = 'screen active';

                switch (screenName) {
                    case 'welcome':
                        renderWelcome(screen);
                        break;
                    case 'path':
                        renderPath(screen);
                        break;
                    case 'lesson':
                        renderLesson(screen, data);
                        break;
                    case 'complete':
                        renderComplete(screen, data);
                        break;
                    default:
                        renderWelcome(screen);
                }
                content.appendChild(screen);
                content.scrollTop = 0;
            }

            function renderWelcome(screen) {
                screen.classList.add('welcome');
                screen.innerHTML = `
                    <h1>Добро пожаловать<br>в <span class="py">PyLingo</span> 🐍</h1>
                    <p>Изучай Python как в Duolingo — уроки, практика, прогресс. Выбери свой путь:</p>
                    <div class="choice-cards">
                        <div class="choice-card" id="chooseStudent">
                            <div class="emoji">👨‍🎓</div>
                            <h3>Студент</h3>
                            <span class="tag beginner">С нуля</span>
                            <small>Основы Python: переменные, циклы, условия. Для начинающих.</small>
                        </div>
                        <div class="choice-card pro-choice" id="choosePro">
                            <div class="emoji">⚡</div>
                            <h3>PRO</h3>
                            <span class="tag advanced">Продвинутый</span>
                            <small>Функции, ООП, декораторы, файлы. Для опытных.</small>
                        </div>
                    </div>
                    ${state.mode ? `<p style="color:var(--text2);font-size:0.85em;">У тебя есть сохранённый прогресс в режиме <b>${state.mode === 'pro' ? 'PRO' : 'Студент'}</b>. <button class="btn btn-outline btn-sm" id="resumeBtn">Продолжить →</button></p>` : ''}
                `;
                // Event listeners
                setTimeout(() => {
                    const cs = document.getElementById('chooseStudent');
                    const cp = document.getElementById('choosePro');
                    const rb = document.getElementById('resumeBtn');
                    if (cs) cs.addEventListener('click', () => selectMode('student'));
                    if (cp) cp.addEventListener('click', () => selectMode('pro'));
                    if (rb) rb.addEventListener('click', () => renderScreen('path'));
                }, 50);
            }

            function selectMode(mode) {
                state.mode = mode;
                state.completedLessons = {};
                state.xp = 0;
                state.streak = 0;
                state.lastLessonDate = null;
                saveState();
                updateTopBar();
                spawnConfetti();
                renderScreen('path');
            }

            function renderPath(screen) {
                if (!state.mode) { renderScreen('welcome'); return; }
                const units = getUnitData();
                const nextLesson = getNextLesson();
                let html = '<h2 style="font-weight:800;">📚 Твой путь обучения</h2>';
                html +=
                    '<p style="color:var(--text2);font-size:0.85em;">Проходи уроки по порядку. За каждый урок +15 XP ⚡</p>';

                for (const unit of units) {
                    const allDone = unit.lessons.every(l => isLessonCompleted(unit.id, l.id));
                    html += `<div class="unit-block ${state.mode==='pro'?'pro-unit':''}">
                        <h4>${allDone ? '✅ ' : ''}${unit.title}</h4>
                        <div class="unit-desc">${unit.desc}</div>
                        <div class="lesson-row">`;
                    for (const lesson of unit.lessons) {
                        const completed = isLessonCompleted(unit.id, lesson.id);
                        const isCurrent = nextLesson && nextLesson.unitId === unit.id && nextLesson.lessonId === lesson
                            .id;
                        let cls = '';
                        if (completed) cls = state.mode === 'pro' ? 'pro-completed' : 'completed';
                        else if (isCurrent) cls = 'current';
                        else cls = 'locked';
                        const icon = completed ? '✓' : (isCurrent ? '▶' : '🔒');
                        html +=
                            `<div class="lesson-node ${cls}" data-unit="${unit.id}" data-lesson="${lesson.id}" title="${lesson.title}">${icon}</div>`;
                    }
                    html += '</div></div>';
                }
                screen.innerHTML = html;

                // Click handlers
                setTimeout(() => {
                    const nodes = screen.querySelectorAll('.lesson-node');
                    nodes.forEach(node => {
                        node.addEventListener('click', () => {
                            const unitId = parseInt(node.dataset.unit);
                            const lessonId = parseInt(node.dataset.lesson);
                            const completed = isLessonCompleted(unitId, lessonId);
                            const isCurrent = nextLesson && nextLesson.unitId === unitId && nextLesson
                                .lessonId === lessonId;
                            if (completed || isCurrent) {
                                openLesson(unitId, lessonId);
                            } else {
                                shakeElement(node);
                            }
                        });
                    });
                }, 50);
            }

            function openLesson(unitId, lessonId) {
                const units = getUnitData();
                const unit = units.find(u => u.id === unitId);
                if (!unit) return;
                const lesson = unit.lessons.find(l => l.id === lessonId);
                if (!lesson) return;
                renderScreen('lesson', { unit, lesson, unitId, lessonId });
            }

            function renderLesson(screen, data) {
                const { unit, lesson, unitId, lessonId } = data;
                state.currentLessonKey = makeLessonKey(unitId, lessonId);
                state.currentExerciseIndex = 0;
                state.exerciseAttempts = 0;

                let html = `
                    <button class="btn btn-outline btn-sm" id="backToPath">← К урокам</button>
                    <h3 style="font-weight:700;">${lesson.title}</h3>
                    <div class="lesson-theory">${lesson.theory}</div>
                    <div id="exerciseContainer"></div>
                    <div class="feedback" id="feedback"></div>
                    <div class="btn-row" id="btnRow">
                        <button class="btn btn-primary" id="checkBtn">✅ Проверить</button>
                        <button class="btn btn-outline btn-sm" id="hintBtn">💡 Подсказка</button>
                    </div>
                    <div class="sandbox-output" id="sandboxOutput" style="display:none;"></div>
                `;
                screen.innerHTML = html;
                screen.dataset.unitId = unitId;
                screen.dataset.lessonId = lessonId;

                renderExercise(screen, lesson, 0);

                setTimeout(() => {
                    const backBtn = document.getElementById('backToPath');
                    if (backBtn) backBtn.addEventListener('click', () => renderScreen('path'));
                    const checkBtn = document.getElementById('checkBtn');
                    const hintBtn = document.getElementById('hintBtn');
                    if (checkBtn) checkBtn.addEventListener('click', () => checkExercise(screen, lesson));
                    if (hintBtn) hintBtn.addEventListener('click', () => showHint(lesson));
                }, 50);
            }

            function renderExercise(screen, lesson, index) {
                const container = document.getElementById('exerciseContainer');
                if (!container) return;
                const ex = lesson.exercises[index];
                if (!ex) return;
                state.currentExerciseIndex = index;
                state.exerciseAttempts = 0;
                const fb = document.getElementById('feedback');
                if (fb) { fb.className = 'feedback';
                    fb.textContent = ''; }
                const sandboxOut = document.getElementById('sandboxOutput');
                if (sandboxOut) sandboxOut.style.display = 'none';

                let exHTML = `<div class="exercise-box" id="exerciseBox">
                    <div class="q">📝 <b>Задание ${index+1}/${lesson.exercises.length}:</b> ${ex.q}</div>`;

                if (ex.type === 'code') {
                    exHTML +=
                        `<textarea id="codeInput" placeholder="Введи свой Python-код здесь...">${ex._savedCode || ''}</textarea>`;
                } else if (ex.type === 'mc') {
                    exHTML += '<div class="mc-options">';
                    ex.options.forEach((opt, i) => {
                        exHTML +=
                            `<div class="mc-option" data-index="${i}" id="mcOpt${i}">${String.fromCharCode(65+i)}) ${opt}</div>`;
                    });
                    exHTML += '</div>';
                }

                exHTML += '</div>';
                container.innerHTML = exHTML;

                // MC click handlers
                if (ex.type === 'mc') {
                    setTimeout(() => {
                        ex.options.forEach((_, i) => {
                            const optEl = document.getElementById('mcOpt' + i);
                            if (optEl) {
                                optEl.addEventListener('click', () => {
                                    document.querySelectorAll('.mc-option').forEach(o => o.classList
                                        .remove('selected'));
                                    optEl.classList.add('selected');
                                    optEl.dataset.selected = 'true';
                                });
                            }
                        });
                    }, 50);
                }

                // Save code on input
                if (ex.type === 'code') {
                    setTimeout(() => {
                        const codeInput = document.getElementById('codeInput');
                        if (codeInput) {
                            codeInput.addEventListener('input', () => {
                                ex._savedCode = codeInput.value;
                            });
                            if (ex._savedCode) codeInput.value = ex._savedCode;
                        }
                    }, 50);
                }

                // Update button
                const checkBtn = document.getElementById('checkBtn');
                const btnRow = document.getElementById('btnRow');
                if (checkBtn) checkBtn.textContent = '✅ Проверить';
                if (checkBtn) checkBtn.disabled = false;
                if (btnRow) btnRow.style.display = 'flex';
                const hintBtn = document.getElementById('hintBtn');
                if (hintBtn) hintBtn.style.display = 'inline-flex';
            }

            function checkExercise(screen, lesson) {
                const ex = lesson.exercises[state.currentExerciseIndex];
                if (!ex) return;
                const fb = document.getElementById('feedback');
                const exerciseBox = document.getElementById('exerciseBox');
                const sandboxOut = document.getElementById('sandboxOutput');

                let isCorrect = false;
                let userAnswer = '';

                if (ex.type === 'code') {
                    const codeInput = document.getElementById('codeInput');
                    if (!codeInput) return;
                    const code = codeInput.value.trim();
                    ex._savedCode = code;
                    if (!code) {
                        showFeedback('Напиши код! 😅', 'error');
                        return;
                    }
                    try {
                        const output = py.run(code);
                        userAnswer = output.trim();
                        const expected = ex.answer.trim();
                        // Normalize comparison
                        const normOut = output.trim().replace(/\s+/g, ' ');
                        const normExp = expected.replace(/\s+/g, ' ');
                        if (normOut === normExp || output.trim() === expected.trim()) {
                            isCorrect = true;
                        } else {
                            // Check if output contains expected
                            if (output.trim().includes(expected.trim()) && expected.trim().length > 0) {
                                isCorrect = true;
                            }
                        }
                        if (sandboxOut) {
                            sandboxOut.style.display = 'block';
                            sandboxOut.textContent = '🖥️ Вывод твоего кода:\n' + (output || '(пусто)');
                            sandboxOut.style.color = isCorrect ? '#6be010' : '#ff6b6b';
                        }
                    } catch (e) {
                        userAnswer = 'ОШИБКА: ' + e.message;
                        if (sandboxOut) {
                            sandboxOut.style.display = 'block';
                            sandboxOut.textContent = '⚠️ Ошибка в коде: ' + e.message;
                            sandboxOut.style.color = '#ff6b6b';
                        }
                    }
                } else if (ex.type === 'mc') {
                    const selected = document.querySelector('.mc-option.selected');
                    if (!selected) {
                        showFeedback('Выбери вариант ответа! 😅', 'error');
                        return;
                    }
                    const selIndex = parseInt(selected.dataset.index);
                    userAnswer = ex.options[selIndex];
                    if (selIndex === ex.answer) {
                        isCorrect = true;
                        selected.classList.add('correct-choice');
                    } else {
                        selected.classList.add('wrong-choice');
                        const correctEl = document.getElementById('mcOpt' + ex.answer);
                        if (correctEl) correctEl.classList.add('correct-choice');
                    }
                }

                state.exerciseAttempts++;

                if (isCorrect) {
                    if (exerciseBox) exerciseBox.classList.add('correct');
                    showFeedback('🎉 Отлично! Правильно!', 'success');
                    const checkBtn = document.getElementById('checkBtn');
                    if (checkBtn) checkBtn.disabled = true;
                    const hintBtn = document.getElementById('hintBtn');
                    if (hintBtn) hintBtn.style.display = 'none';
                    // Disable MC options
                    if (ex.type === 'mc') {
                        document.querySelectorAll('.mc-option').forEach(o => o.style.pointerEvents = 'none');
                    }
                    if (ex.type === 'code') {
                        const codeInput = document.getElementById('codeInput');
                        if (codeInput) codeInput.disabled = true;
                    }

                    // Move to next exercise or complete lesson
                    setTimeout(() => {
                        if (state.currentExerciseIndex + 1 < lesson.exercises.length) {
                            renderExercise(screen, lesson, state.currentExerciseIndex + 1);
                            if (exerciseBox) exerciseBox.classList.remove('correct');
                        } else {
                            completeLesson(
                                parseInt(screen.dataset.unitId),
                                parseInt(screen.dataset.lessonId)
                            );
                            renderScreen('complete', {
                                lessonTitle: lesson.title,
                                unitId: parseInt(screen.dataset.unitId),
                                lessonId: parseInt(screen.dataset.lessonId),
                            });
                            spawnConfetti();
                        }
                    }, 1200);
                } else {
                    if (exerciseBox) exerciseBox.classList.add('wrong');
                    setTimeout(() => { if (exerciseBox) exerciseBox.classList.remove('wrong'); }, 500);
                    showFeedback('❌ Не совсем так. Попробуй ещё раз!', 'error');
                    if (ex.type === 'mc') {
                        setTimeout(() => {
                            document.querySelectorAll('.mc-option').forEach(o => {
                                o.classList.remove('selected', 'correct-choice',
                                    'wrong-choice');
                                o.dataset.selected = '';
                            });
                        }, 800);
                    }
                }
            }

            function showFeedback(msg, type) {
                const fb = document.getElementById('feedback');
                if (!fb) return;
                fb.textContent = msg;
                fb.className = 'feedback show ' + (type === 'success' ? 'success' : 'error');
                if (type === 'success') {
                    setTimeout(() => { fb.className = 'feedback'; }, 2000);
                }
            }

            function showHint(lesson) {
                const ex = lesson.exercises[state.currentExerciseIndex];
                if (ex && ex.hint) {
                    showFeedback('💡 Подсказка: ' + ex.hint, 'success');
                } else {
                    showFeedback('🤷 Подсказки нет, подумай сам!', 'error');
                }
            }

            function renderComplete(screen, data) {
                screen.style.textAlign = 'center';
                screen.style.justifyContent = 'center';
                screen.style.alignItems = 'center';
                screen.innerHTML = `
                    <div style="font-size:4em;">🏆</div>
                    <h2>Урок пройден!</h2>
                    <p style="color:var(--text2);">${data.lessonTitle}</p>
                    <div style="font-size:2em;font-weight:900;color:var(--gold);">+15 XP ⚡</div>
                    <p>Серия: 🔥 ${state.streak} дней</p>
                    <div class="btn-row" style="justify-content:center;">
                        <button class="btn btn-primary" id="nextLessonBtn">📚 Следующий урок</button>
                        <button class="btn btn-outline" id="backToPathBtn">🗺️ К списку уроков</button>
                    </div>
                `;
                setTimeout(() => {
                    const nxt = document.getElementById('nextLessonBtn');
                    const btp = document.getElementById('backToPathBtn');
                    if (nxt) nxt.addEventListener('click', () => {
                        const next = getNextLesson();
                        if (next) {
                            openLesson(next.unitId, next.lessonId);
                        } else {
                            renderScreen('path');
                            spawnConfetti();
                            setTimeout(() => alert(
                                '🎉 Поздравляем! Ты прошёл все уроки в этом режиме! Попробуй другой режим или начни заново.'
                                ), 300);
                        }
                    });
                    if (btp) btp.addEventListener('click', () => renderScreen('path'));
                }, 50);
            }

            function shakeElement(el) {
                el.style.animation = 'none';
                el.offsetHeight;
                el.style.animation = 'shake 0.5s ease';
                setTimeout(() => { el.style.animation = ''; }, 500);
            }

            function spawnConfetti() {
                const colors = ['#58cc02', '#ffc800', '#ff4b4b', '#4da6ff', '#ff8c42', '#b066ff', '#ff69b4',
                '#00e5ff'];
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 60; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.top = -(Math.random() * 40 + 10) + 'px';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    piece.style.animationDelay = Math.random() * 0.8 + 's';
                    piece.style.width = (Math.random() * 8 + 6) + 'px';
                    piece.style.height = (Math.random() * 8 + 6) + 'px';
                    fragment.appendChild(piece);
                }
                confettiContainer.appendChild(fragment);
                setTimeout(() => {
                    confettiContainer.innerHTML = '';
                }, 3500);
            }

            // ============ INIT ============
            function init() {
                loadState();
                updateTopBar();
                if (state.mode && getNextLesson()) {
                    renderScreen('path');
                } else if (state.mode && !getNextLesson()) {
                    // All completed
                    renderScreen('path');
                } else {
                    renderScreen('welcome');
                }
            }

            init();
            console.log('🐍 PyLingo готов! Изучай Python весело.');
            console.log('Режимы: Студент (с нуля) | PRO (продвинутый)');
            console.log('Твой прогресс сохраняется в браузере.');
        })();
    </script>
</body>
</html>
