<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <title>Minion Coin ⛏️</title>
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #1f1f2b;
      --surface-light: #2a2a3a;
      --gold: #fbbf24;
      --gold-dark: #d97706;
      --yellow: #fde047;
      --blue: #3b82f6;
      --blue-dark: #1e3a8a;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 20px;
      --radius-sm: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a14;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: manipulation;
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #0d1117 0%, #161b22 30%, #1f1f2b 100%);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* Stars */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
      opacity: 0;
    }
    @keyframes twinkle {
      0%,100%{ opacity:0.15; transform:scale(0.8); }
      50%{ opacity:0.8; transform:scale(1.4); }
    }

    /* Header */
    .header {
      position: relative;
      z-index: 5;
      padding: 14px 18px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .coin-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 40px;
      padding: 8px 18px;
      backdrop-filter: blur(10px);
    }
    .coin-icon {
      font-size: 24px;
    }
    .balance {
      font-weight: 700;
      font-size: 20px;
      color: #fff;
      letter-spacing: 0.3px;
      transition: transform 0.15s, color 0.15s;
    }
    .balance.bump {
      transform: scale(1.1);
      color: var(--yellow);
    }
    .level-badge {
      background: var(--blue);
      color: white;
      font-weight: 700;
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 30px;
      box-shadow: 0 0 18px rgba(59,130,246,0.4);
      letter-spacing: 0.5px;
    }

    /* Main content area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    /* Minion tap area */
    .tap-area {
      position: relative;
      cursor: pointer;
      transition: transform 0.08s ease;
    }
    .tap-area:active {
      transform: scale(0.9);
    }
    .tap-area.pressed {
      transform: scale(0.85) !important;
    }

    .minion-container {
      width: 130px;
      height: 150px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{ transform: translateY(0); }
      40%{ transform: translateY(-8px); }
      70%{ transform: translateY(-4px); }
      85%{ transform: translateY(-10px); }
    }
    .tap-area.pressed .minion-container {
      animation: none;
      transform: scale(0.9);
    }

    /* Minion CSS art */
    .minion-body {
      width: 110px;
      height: 115px;
      background: #fbbf24;
      border-radius: 50% 50% 42% 42%;
      position: relative;
      box-shadow: 0 8px 0 #b45309, 0 18px 30px rgba(0,0,0,0.5);
      overflow: visible;
    }
    .overall-strap {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 45px;
      height: 14px;
      background: #2563eb;
      border-radius: 6px;
      box-shadow: 0 2px 0 #1e3a8a;
    }
    .goggle {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 38px;
      height: 38px;
      background: #e2e8f0;
      border-radius: 50%;
      border: 4px solid #64748b;
      box-shadow: 0 0 0 3px #94a3b8, 0 4px 8px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pupil {
      width: 14px;
      height: 14px;
      background: #0f172a;
      border-radius: 50%;
      position: relative;
    }
    .pupil::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 4px;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
    }
    .mouth {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 12px;
      border-bottom: 4px solid #0f172a;
      border-radius: 0 0 50% 50%;
    }
    .pickaxe-hint {
      position: absolute;
      top: -25px;
      right: -15px;
      font-size: 30px;
      animation: swing 1s ease-in-out infinite alternate;
      transform-origin: bottom right;
    }
    @keyframes swing {
      0%{ transform: rotate(-10deg); }
      100%{ transform: rotate(10deg); }
    }

    /* Floating number */
    .float-number {
      position: absolute;
      pointer-events: none;
      font-weight: 800;
      font-size: 22px;
      color: #fde047;
      animation: floatUp 0.9s ease-out forwards;
      z-index: 20;
      text-shadow: 0 0 15px rgba(253,224,71,0.8);
      white-space: nowrap;
    }
    @keyframes floatUp {
      0%{ opacity:1; transform: translateY(0) scale(0.6); }
      30%{ opacity:1; transform: translateY(-35px) scale(1.2); }
      100%{ opacity:0; transform: translateY(-90px) scale(0.7); }
    }

    /* Coin particles */
    .coin-particle {
      position: absolute;
      pointer-events: none;
      font-size: 18px;
      animation: particleBurst 0.7s ease-out forwards;
      z-index: 10;
    }
    @keyframes particleBurst {
      0%{ opacity:1; transform: translate(0,0) scale(1); }
      100%{ opacity:0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    /* Energy bar */
    .energy-section {
      position: relative;
      z-index: 2;
      padding: 0 20px 8px;
      width: 100%;
      max-width: 350px;
      margin: 0 auto;
    }
    .energy-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .energy-bar-outer {
      height: 12px;
      background: #2d2d3f;
      border-radius: 20px;
      overflow: hidden;
    }
    .energy-bar-inner {
      height: 100%;
      border-radius: 20px;
      transition: width 0.3s;
      background: #22c55e;
    }
    .energy-bar-inner.mid { background: #f59e0b; }
    .energy-bar-inner.low { background: #ef4444; }

    /* Bottom nav */
    .bottom-nav {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 4px;
      padding: 8px 10px calc(8px + var(--safe-bottom));
      background: rgba(15,15,28,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 4px;
      background: transparent;
      border: none;
      color: #6b7280;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s;
      position: relative;
    }
    .nav-btn.active {
      color: #fbbf24;
      background: rgba(251,191,36,0.08);
    }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      top: -6px;
      width: 28px;
      height: 3px;
      background: #fbbf24;
      border-radius: 0 0 4px 4px;
    }
    .nav-icon { font-size: 22px; }

    /* Panels */
    .panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      z-index: 2;
      padding: 8px 16px 16px;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .panel.active { display: flex; }
    .panel::-webkit-scrollbar { width:0; }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    /* Boost card */
    .boost-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s;
    }
    .boost-card:active { transform: scale(0.97); background: #252536; }
    .boost-icon-box {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .boost-info { flex:1; min-width:0; }
    .boost-name { font-weight:700; font-size:14px; color:#fff; }
    .boost-desc { font-size:11px; color:var(--text-secondary); margin-top:2px; }
    .boost-cost { font-weight:700; font-size:14px; color:var(--gold); white-space:nowrap; }
    .boost-level { font-size:11px; color:var(--blue); font-weight:600; margin-top:2px; }

    /* Leaderboard table */
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    .leaderboard-table th {
      text-align: left;
      padding: 12px 8px;
      font-size: 12px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .leaderboard-table td {
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 14px;
    }
    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .player-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      overflow: hidden;
    }
    .player-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .rank-badge {
      font-weight: 700;
      width: 24px;
      text-align: center;
    }
    .highlight-row {
      background: rgba(251,191,36,0.08);
    }

    /* Profile */
    .profile-avatar-large {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fbbf24, #d97706);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 40px;
      box-shadow: 0 10px 25px rgba(251,191,36,0.3);
      overflow: hidden;
    }
    .profile-avatar-large img { width:100%; height:100%; object-fit:cover; }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-item {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color:#fff; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: #1e293b;
      color: #fff;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="stars" id="starsContainer"></div>

  <!-- Header -->
  <div class="header">
    <div class="coin-box">
      <span class="coin-icon">🪙</span>
      <span class="balance" id="balanceDisplay">0</span>
    </div>
    <div class="level-badge" id="levelBadge">LVL 1</div>
  </div>

  <!-- Main Panel -->
  <div class="panel active" id="panelMain">
    <div class="main-content">
      <div class="tap-area" id="tapArea">
        <div class="minion-container">
          <div class="minion-body">
            <div class="overall-strap"></div>
            <div class="goggle">
              <div class="pupil"></div>
            </div>
            <div class="mouth"></div>
          </div>
          <span class="pickaxe-hint">⛏️</span>
        </div>
      </div>
    </div>
    <div class="energy-section">
      <div class="energy-label-row">
        <span>⚡ Энергия</span>
        <span id="energyText">500 / 500</span>
      </div>
      <div class="energy-bar-outer">
        <div class="energy-bar-inner" id="energyBar"></div>
      </div>
    </div>
  </div>

  <!-- Boosts Panel -->
  <div class="panel" id="panelBoosts">
    <h3 style="color:#fff;font-size:18px;">⚡ Улучшения</h3>
    <p style="color:var(--text-secondary);font-size:12px;margin-bottom:4px;">Прокачивай добычу монет</p>
    <div id="boostsContainer"></div>
  </div>

  <!-- Leaderboard Panel -->
  <div class="panel" id="panelLeaderboard">
    <h3 style="color:#fff;font-size:18px;">🏆 Таблица лидеров</h3>
    <table class="leaderboard-table">
      <thead>
        <tr><th>#</th><th>Игрок</th><th>Монеты</th></tr>
      </thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
    <p style="font-size:11px;color:var(--text-secondary);text-align:center;margin-top:8px;">Топ-10 майнеров</p>
  </div>

  <!-- Profile Panel -->
  <div class="panel" id="panelProfile">
    <div class="card" style="text-align:center;">
      <div class="profile-avatar-large" id="profileAvatar">⛏️</div>
      <div style="font-weight:700;font-size:18px;" id="profileName">Миньон</div>
      <div style="font-size:13px;color:var(--text-secondary);" id="profileUsername">@miner</div>
      <div style="margin-top:8px;"><span class="level-badge" id="profileLevel">LVL 1</span></div>
    </div>
    <div class="stat-grid">
      <div class="stat-item"><div class="stat-value" id="statTotalEarned">0</div><div class="stat-label">Всего добыто</div></div>
      <div class="stat-item"><div class="stat-value" id="statTaps">0</div><div class="stat-label">Тапов</div></div>
      <div class="stat-item"><div class="stat-value" id="statPerTap">+1</div><div class="stat-label">За тап</div></div>
      <div class="stat-item"><div class="stat-value" id="statMaxEnergy">500</div><div class="stat-label">Макс. энергия</div></div>
    </div>
    <button id="resetBtn" style="background:var(--danger);color:#fff;border:none;padding:14px;border-radius:var(--radius);font-weight:700;cursor:pointer;">
      🔄 Сбросить прогресс
    </button>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-panel="panelMain"><span class="nav-icon">🏠</span>Главная</button>
    <button class="nav-btn" data-panel="panelBoosts"><span class="nav-icon">⚡</span>Бусты</button>
    <button class="nav-btn" data-panel="panelLeaderboard"><span class="nav-icon">🏆</span>Лидеры</button>
    <button class="nav-btn" data-panel="panelProfile"><span class="nav-icon">👤</span>Профиль</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
  (function() {
    // Telegram WebApp
    const tg = window.Telegram?.WebApp;
    const isTelegram = !!tg;
    if (isTelegram) {
      tg.ready();
      tg.expand();
      tg.enableClosingConfirmation();
    }

    // ---------- Game state ----------
    const defaultState = {
      coins: 0,
      totalEarned: 0,
      tapCount: 0,
      energy: 500,
      maxEnergy: 500,
      coinsPerTap: 1,
      energyRegen: 1,
      pickaxeLevel: 0,
      batteryLevel: 0,
      generatorLevel: 0,
      sessionStart: Date.now(),
      totalPlaySec: 0,
    };

    let state = loadState();
    function loadState() {
      try {
        const saved = localStorage.getItem('minioncoin_state');
        if (saved) {
          const parsed = JSON.parse(saved);
          const merged = { ...defaultState, ...parsed };
          merged.energy = Math.min(merged.energy, merged.maxEnergy);
          merged.sessionStart = Date.now();
          return merged;
        }
      } catch(e) {}
      return { ...defaultState, sessionStart: Date.now() };
    }
    function saveState() {
      try {
        const s = { ...state };
        s.totalPlaySec += Math.floor((Date.now() - state.sessionStart)/1000);
        s.sessionStart = Date.now();
        state.totalPlaySec = s.totalPlaySec;
        state.sessionStart = s.sessionStart;
        localStorage.setItem('minioncoin_state', JSON.stringify(s));
      } catch(e) {}
    }
    setInterval(saveState, 10000);
    window.addEventListener('beforeunload', saveState);
    document.addEventListener('visibilitychange', () => { if(document.hidden) saveState(); });

    // ---------- Player identity ----------
    let playerId, playerName, playerAvatar = null;
    if (isTelegram && tg.initDataUnsafe?.user) {
      const u = tg.initDataUnsafe.user;
      playerId = 'tg_' + u.id;
      playerName = u.first_name || 'Миньон';
      playerAvatar = u.photo_url || null;
    } else {
      // Local player
      let localId = localStorage.getItem('minion_local_id');
      if (!localId) {
        localId = 'local_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('minion_local_id', localId);
      }
      playerId = localId;
      playerName = 'Шахтёр ' + localId.slice(-4);
      playerAvatar = null;
    }

    // ---------- Leaderboard management ----------
    const LEADERBOARD_KEY = 'minioncoin_leaderboard';
    function getDefaultLeaderboard() {
      const names = ['Боб', 'МегаМайнер', 'Кирка', 'Золотко', 'КриптоКрот', 'Шахтёр777', 'Гном', 'Рудокоп', 'Бур', 'МиньонБосс'];
      return names.map((name, i) => ({
        id: 'bot_' + i,
        name: name,
        coins: Math.floor(500 + Math.random() * 15000),
        avatar: null
      }));
    }
    function loadLeaderboard() {
      try {
        const raw = localStorage.getItem(LEADERBOARD_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return getDefaultLeaderboard();
    }
    function saveLeaderboard(list) {
      localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(list));
    }
    function updateLeaderboardEntry() {
      let list = loadLeaderboard();
      // Remove old entry for this player
      list = list.filter(e => e.id !== playerId);
      // Add current
      list.push({
        id: playerId,
        name: playerName,
        coins: state.coins,
        avatar: playerAvatar
      });
      // Sort desc
      list.sort((a,b) => b.coins - a.coins);
      // Keep top 20
      list = list.slice(0,20);
      saveLeaderboard(list);
      return list;
    }
    function renderLeaderboard() {
      const list = updateLeaderboardEntry();
      const tbody = document.getElementById('leaderboardBody');
      if (!tbody) return;
      tbody.innerHTML = list.map((p, i) => {
        const rank = i+1;
        const rankIcon = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
        const isMe = p.id === playerId;
        const avatarHtml = p.avatar
          ? `<img src="${p.avatar}" alt="avatar">`
          : p.name.charAt(0).toUpperCase();
        return `<tr class="${isMe ? 'highlight-row' : ''}">
          <td class="rank-badge">${rankIcon || rank}</td>
          <td>
            <div class="player-cell">
              <div class="player-avatar">${avatarHtml}</div>
              <span>${p.name}${isMe ? ' (Вы)' : ''}</span>
            </div>
          </td>
          <td style="font-weight:700;">🪙 ${formatNum(p.coins)}</td>
        </tr>`;
      }).join('');
    }

    // ---------- DOM refs ----------
    const balanceEl = document.getElementById('balanceDisplay');
    const levelBadge = document.getElementById('levelBadge');
    const energyBar = document.getElementById('energyBar');
    const energyText = document.getElementById('energyText');
    const tapArea = document.getElementById('tapArea');
    const boostsContainer = document.getElementById('boostsContainer');
    const toast = document.getElementById('toast');
    const resetBtn = document.getElementById('resetBtn');
    const profileLevel = document.getElementById('profileLevel');
    const statTotal = document.getElementById('statTotalEarned');
    const statTaps = document.getElementById('statTaps');
    const statPerTap = document.getElementById('statPerTap');
    const statMaxEnergy = document.getElementById('statMaxEnergy');
    const profileNameEl = document.getElementById('profileName');
    const profileUsernameEl = document.getElementById('profileUsername');
    const profileAvatarEl = document.getElementById('profileAvatar');

    // Update UI
    function updateUI() {
      const level = getLevel(state.totalEarned);
      balanceEl.textContent = formatNum(state.coins);
      levelBadge.textContent = `LVL ${level}`;
      if (profileLevel) profileLevel.textContent = `LVL ${level}`;
      const pct = Math.max(0, Math.min(100, (state.energy/state.maxEnergy)*100));
      energyBar.style.width = pct + '%';
      energyBar.classList.remove('mid','low');
      if (pct < 25) energyBar.classList.add('low');
      else if (pct < 50) energyBar.classList.add('mid');
      energyText.textContent = `${Math.floor(state.energy)} / ${state.maxEnergy}`;
      if (statTotal) statTotal.textContent = formatNum(state.totalEarned);
      if (statTaps) statTaps.textContent = formatNum(state.tapCount);
      if (statPerTap) statPerTap.textContent = '+' + state.coinsPerTap;
      if (statMaxEnergy) statMaxEnergy.textContent = state.maxEnergy;
      if (profileNameEl) profileNameEl.textContent = playerName;
      if (profileUsernameEl) profileUsernameEl.textContent = isTelegram ? ('@' + (tg.initDataUnsafe.user?.username || 'miner')) : '@local_miner';
      if (profileAvatarEl) {
        if (playerAvatar) {
          profileAvatarEl.innerHTML = `<img src="${playerAvatar}" alt="avatar" style="width:100%;height:100%;object-fit:cover;">`;
        } else {
          profileAvatarEl.innerHTML = '⛏️';
        }
      }
      renderBoosts();
      // Update leaderboard every UI refresh
      if (document.getElementById('panelLeaderboard').classList.contains('active')) {
        renderLeaderboard();
      }
    }

    function formatNum(n) {
      if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
      if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
      return Math.floor(n).toString();
    }
    function getLevel(earned) {
      if (earned < 100) return 1;
      if (earned < 500) return 2;
      if (earned < 2000) return 3;
      if (earned < 6000) return 4;
      if (earned < 15000) return 5;
      if (earned < 40000) return 6;
      return 7 + Math.floor((earned-40000)/50000);
    }
    function bumpBalance() {
      balanceEl.classList.add('bump');
      setTimeout(() => balanceEl.classList.remove('bump'), 150);
    }

    // ---------- Boosts ----------
    const boosts = [
      {
        id: 'pickaxe',
        icon: '⛏️',
        iconBg: '#b45309',
        name: 'Кирка',
        desc: '+1 монета за тап',
        level: () => state.pickaxeLevel,
        cost: () => 200 * Math.pow(2, state.pickaxeLevel),
        effect: () => `+${state.coinsPerTap} → +${state.coinsPerTap+1}`,
        buy() { state.pickaxeLevel++; state.coinsPerTap = 1 + state.pickaxeLevel; }
      },
      {
        id: 'battery',
        icon: '🔋',
        iconBg: '#2563eb',
        name: 'Аккумулятор',
        desc: 'Увеличивает запас энергии',
        level: () => state.batteryLevel,
        cost: () => 300 * Math.pow(2, state.batteryLevel),
        effect: () => `${state.maxEnergy} → ${state.maxEnergy+250}`,
        buy() { state.batteryLevel++; state.maxEnergy = 500 + state.batteryLevel*250; state.energy = Math.min(state.energy+250, state.maxEnergy); }
      },
      {
        id: 'generator',
        icon: '⚡',
        iconBg: '#7c3aed',
        name: 'Генератор',
        desc: 'Быстрее восстановление',
        level: () => state.generatorLevel,
        cost: () => 400 * Math.pow(2, state.generatorLevel),
        effect: () => `${state.energyRegen}/сек → ${state.energyRegen+1}/сек`,
        buy() { state.generatorLevel++; state.energyRegen = 1 + state.generatorLevel; }
      }
    ];

    function renderBoosts() {
      if (!boostsContainer) return;
      boostsContainer.innerHTML = boosts.map(b => {
        const lvl = b.level();
        const cost = b.cost();
        const can = state.coins >= cost;
        return `<div class="boost-card" data-id="${b.id}" style="${can?'':'opacity:0.55;'}">
          <div class="boost-icon-box" style="background:${b.iconBg}22;border:2px solid ${b.iconBg}44;">${b.icon}</div>
          <div class="boost-info">
            <div class="boost-name">${b.name}</div>
            <div class="boost-desc">${b.effect()}</div>
            <div class="boost-level">Ур. ${lvl}</div>
          </div>
          <div class="boost-cost" style="color:${can?'var(--gold)':'var(--danger)'}">🪙 ${formatNum(cost)}</div>
        </div>`;
      }).join('');
      boostsContainer.querySelectorAll('.boost-card').forEach(card => {
        card.addEventListener('click', (e) => {
          const id = card.dataset.id;
          const b = boosts.find(x => x.id === id);
          const cost = b.cost();
          if (state.coins >= cost) {
            b.buy();
            state.coins -= cost;
            updateUI();
            showToast('✅ ' + b.name + ' улучшен!');
            if (isTelegram) tg.HapticFeedback.notificationOccurred('success');
          } else {
            showToast('❌ Недостаточно монет');
            if (isTelegram) tg.HapticFeedback.notificationOccurred('error');
          }
        });
      });
    }

    // ---------- Tap handling ----------
    tapArea.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (state.energy < 1) {
        showToast('😴 Нет энергии...');
        if (isTelegram) tg.HapticFeedback.notificationOccurred('error');
        return;
      }
      state.energy = Math.max(0, state.energy-1);
      const earned = state.coinsPerTap;
      state.coins += earned;
      state.totalEarned += earned;
      state.tapCount++;
      bumpBalance();
      tapArea.classList.add('pressed');
      setTimeout(() => tapArea.classList.remove('pressed'), 100);
      spawnFloat(e, earned);
      spawnParticles(e, 5);
      if (isTelegram) try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
      updateUI();
    });
    tapArea.addEventListener('touchstart', (e) => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});

    function spawnFloat(e, amount) {
      const el = document.createElement('span');
      el.className = 'float-number';
      el.textContent = '+' + amount;
      const rect = tapArea.getBoundingClientRect();
      el.style.left = (e.clientX - rect.left) + 'px';
      el.style.top = (e.clientY - rect.top) + 'px';
      tapArea.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
    function spawnParticles(e, count) {
      const rect = tapArea.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      for(let i=0;i<count;i++){
        const p = document.createElement('span');
        p.className = 'coin-particle';
        p.textContent = '🪙';
        p.style.left = cx+'px';
        p.style.top = cy+'px';
        const angle = Math.random()*Math.PI*2;
        const dist = 40+Math.random()*60;
        p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
        p.style.setProperty('--dy', Math.sin(angle)*dist-30+'px');
        tapArea.appendChild(p);
        p.addEventListener('animationend', ()=>p.remove());
      }
    }

    // Energy regen
    setInterval(() => {
      if (state.energy < state.maxEnergy) {
        state.energy = Math.min(state.maxEnergy, state.energy + state.energyRegen);
        updateUI();
      }
    }, 1000);

    // ---------- Toast ----------
    let toastTimer;
    function showToast(msg) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ---------- Navigation ----------
    const navBtns = document.querySelectorAll('.nav-btn');
    const panels = {
      panelMain: document.getElementById('panelMain'),
      panelBoosts: document.getElementById('panelBoosts'),
      panelLeaderboard: document.getElementById('panelLeaderboard'),
      panelProfile: document.getElementById('panelProfile')
    };
    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.panel;
        navBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        Object.values(panels).forEach(p => p.classList.remove('active'));
        if (panels[target]) panels[target].classList.add('active');
        if (target === 'panelLeaderboard') renderLeaderboard();
        if (target === 'panelProfile' || target === 'panelBoosts') updateUI();
      });
    });

    // Reset
    resetBtn.addEventListener('click', () => {
      if (confirm('Сбросить весь прогресс?')) {
        state = { ...defaultState, sessionStart: Date.now() };
        saveState();
        updateUI();
        showToast('🔄 Прогресс сброшен');
      }
    });

    // Stars
    (function createStars() {
      let html = '';
      for(let i=0;i<55;i++){
        const size = 1+Math.random()*2.2;
        html += `<span class="star" style="left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${2+Math.random()*5}s;--delay:${Math.random()*6}s;"></span>`;
      }
      document.getElementById('starsContainer').innerHTML = html;
    })();

    // Init
    updateUI();
    renderLeaderboard();
    console.log('⛏️ Minion Coin ready!');
  })();
</script>
</body>
</html>
